name: vocab-web

services:
  postgres:
    image: postgres:16
    container_name: english-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: english_app_db
    ports:
      - "5430:5432"
    volumes:
      - english_postgres_data:/var/lib/postgresql/data

volumes:
  english_postgres_data: